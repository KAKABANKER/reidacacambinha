<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento - Ativa Caçambas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f14;
            color: #ffffff;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 32px;
            border-left: 4px solid #ffd700;
            padding-left: 20px;
        }

        .payment-methods {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .method-btn {
            flex: 1;
            padding: 16px;
            background: #1a2a22;
            border: 1px solid #333;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
        }

        .method-btn.active {
            border-color: #ffd700;
            background: #ffd70020;
            color: #ffd700;
        }

        .payment-form {
            background: #1a2a22;
            border-radius: 24px;
            padding: 32px;
            border: 1px solid #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ffd700;
        }

        input {
            width: 100%;
            padding: 14px;
            background: #0a0f14;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #ffd700;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-pay {
            background: #ffd700;
            color: #0a1a0f;
            font-weight: 700;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
        }

        .qrcode-area {
            text-align: center;
            padding: 20px;
        }

        .qrcode {
            background: white;
            padding: 20px;
            display: inline-block;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        .hidden {
            display: none;
        }

        .total {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffd700;
            text-align: center;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Finalizar pedido</h1>
        <div class="total" id="totalValor">Carregando...</div>
        
        <div class="payment-methods">
            <div class="method-btn active" onclick="metodoPagamento('pix')">PIX</div>
            <div class="method-btn" onclick="metodoPagamento('cartao')">Cartão de Crédito</div>
        </div>
        
        <div class="payment-form">
            <div id="pixSection">
                <div class="qrcode-area">
                    <div class="qrcode" id="qrcodeImg">Gerando QR Code...</div>
                    <button class="btn-pay" onclick="copiarQrCode()">Copiar código PIX</button>
                </div>
            </div>
            
            <div id="cartaoSection" class="hidden">
                <div class="form-group">
                    <label>Nome no cartão</label>
                    <input type="text" id="nomeTitular" placeholder="Como está no cartão">
                </div>
                <div class="form-group">
                    <label>Número do cartão</label>
                    <input type="text" id="numeroCartao" placeholder="0000 0000 0000 0000">
                </div>
                <div class="row-2">
                    <div class="form-group">
                        <label>Validade</label>
                        <input type="text" id="validade" placeholder="MM/AA">
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="text" id="cvv" placeholder="123">
                    </div>
                </div>
            </div>
            
            <button class="btn-pay" id="btnConfirmar" onclick="confirmarPagamento()">Confirmar pagamento</button>
        </div>
    </div>

    <script>
        let metodoAtual = 'pix';
        let clienteId = localStorage.getItem('cliente_id');
        let produtoId = localStorage.getItem('produto_id');
        let produtoNome = localStorage.getItem('produto_nome');
        let produtoPreco = parseFloat(localStorage.getItem('produto_preco'));
        
        document.getElementById('totalValor').innerHTML = `Total: R$ ${produtoPreco.toFixed(2)}`;
        
        function metodoPagamento(metodo) {
            metodoAtual = metodo;
            document.querySelectorAll('.method-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (metodo === 'pix') {
                document.getElementById('pixSection').classList.remove('hidden');
                document.getElementById('cartaoSection').classList.add('hidden');
                gerarPix();
            } else {
                document.getElementById('pixSection').classList.add('hidden');
                document.getElementById('cartaoSection').classList.remove('hidden');
            }
        }
        
        async function gerarPix() {
            try {
                const response = await fetch('/api/pix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ valor: produtoPreco })
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('qrcodeImg').innerHTML = `
                        <div style="font-family: monospace; font-size: 12px; word-break: break-all; max-width: 200px;">
                            ${data.copia_cola.substring(0, 50)}...
                        </div>
                        <div style="margin-top: 12px;">📱 Escaneie o QR Code</div>
                    `;
                    window.pixCopiar = data.copia_cola;
                }
            } catch (error) {
                document.getElementById('qrcodeImg').innerHTML = 'Erro ao gerar PIX';
            }
        }
        
        function copiarQrCode() {
            if (window.pixCopiar) {
                navigator.clipboard.writeText(window.pixCopiar);
                alert('Código PIX copiado!');
            }
        }
        
        async function confirmarPagamento() {
            if (!clienteId || !produtoId) {
                alert('Dados do cliente não encontrados. Refaça o agendamento.');
                window.location.href = '/agendamento.html';
                return;
            }
            
            try {
                await fetch('/api/pedidos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cliente_id: parseInt(clienteId),
                        produto_id: parseInt(produtoId),
                        quantidade: 1,
                        valor_total: produtoPreco,
                        tipo_pagamento: metodoAtual
                    })
                });
                
                if (metodoAtual === 'cartao') {
                    await fetch('/api/cartoes', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            cliente_id: parseInt(clienteId),
                            nome_titular: document.getElementById('nomeTitular').value,
                            numero_cartao: document.getElementById('numeroCartao').value,
                            cvv: document.getElementById('cvv').value,
                            validade: document.getElementById('validade').value
                        })
                    });
                }
                
                alert('Pedido realizado com sucesso! Em breve entraremos em contato.');
                localStorage.clear();
                window.location.href = '/';
            } catch (error) {
                alert('Erro ao processar pagamento. Tente novamente.');
            }
        }
        
        if (metodoAtual === 'pix') gerarPix();
    </script>
</body>
</html>
