<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento - Ativa Caçambas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f14;
            color: #ffffff;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 32px;
            border-left: 4px solid #ffd700;
            padding-left: 20px;
        }

        .payment-methods {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .method-btn {
            flex: 1;
            padding: 16px;
            background: #1a2a22;
            border: 1px solid #333;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
        }

        .method-btn.active {
            border-color: #ffd700;
            background: #ffd70020;
            color: #ffd700;
        }

        .payment-form {
            background: #1a2a22;
            border-radius: 24px;
            padding: 32px;
            border: 1px solid #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ffd700;
        }

        input {
            width: 100%;
            padding: 14px;
            background: #0a0f14;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #ffd700;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-pay {
            background: #ffd700;
            color: #0a1a0f;
            font-weight: 700;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
        }

        .qrcode-area {
            text-align: center;
            padding: 20px;
        }

        .qrcode {
            background: white;
            padding: 20px;
            display: inline-block;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        .hidden {
            display: none;
        }

        .total {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffd700;
            text-align: center;
            margin-bottom: 24px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #ffd700;
        }

        .error {
            color: #ff4444;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Finalizar pedido</h1>
        <div class="total" id="totalValor">Carregando...</div>
        
        <div class="payment-methods">
            <div class="method-btn active" onclick="metodoPagamento('pix')">PIX</div>
            <div class="method-btn" onclick="metodoPagamento('cartao')">Cartão de Crédito</div>
        </div>
        
        <div class="payment-form">
            <div id="pixSection">
                <div class="qrcode-area">
                    <div id="qrcodeImg" class="qrcode">Clique em Gerar PIX</div>
                    <button class="btn-pay" id="btnGerarPix" onclick="gerarPix()">GERAR PIX</button>
                    <button class="btn-pay hidden" id="btnCopiarPix" onclick="copiarQrCode()">Copiar código PIX</button>
                </div>
            </div>
            
            <div id="cartaoSection" class="hidden">
                <div class="form-group">
                    <label>Nome no cartão</label>
                    <input type="text" id="nomeTitular" placeholder="Como está no cartão">
                </div>
                <div class="form-group">
                    <label>Número do cartão</label>
                    <input type="text" id="numeroCartao" placeholder="0000 0000 0000 0000">
                </div>
                <div class="row-2">
                    <div class="form-group">
                        <label>Validade</label>
                        <input type="text" id="validade" placeholder="MM/AA">
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="text" id="cvv" placeholder="123">
                    </div>
                </div>
            </div>
            
            <button class="btn-pay" id="btnConfirmar" onclick="confirmarPagamento()">Confirmar pagamento</button>
        </div>
    </div>

    <script>
        let metodoAtual = 'pix';
        let clienteId = localStorage.getItem('cliente_id');
        let produtoId = localStorage.getItem('produto_id');
        let produtoNome = localStorage.getItem('produto_nome');
        let produtoPreco = parseFloat(localStorage.getItem('produto_preco'));
        let clienteNome = localStorage.getItem('cliente_nome');
        let clienteCpf = localStorage.getItem('cliente_cpf');
        let clienteTelefone = localStorage.getItem('cliente_telefone');
        
        let currentPixCode = '';
        
        document.getElementById('totalValor').innerHTML = `Total: R$ ${produtoPreco.toFixed(2)}`;
        
        function metodoPagamento(metodo) {
            metodoAtual = metodo;
            document.querySelectorAll('.method-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (metodo === 'pix') {
                document.getElementById('pixSection').classList.remove('hidden');
                document.getElementById('cartaoSection').classList.add('hidden');
                document.getElementById('qrcodeImg').innerHTML = 'Clique em Gerar PIX';
                document.getElementById('btnGerarPix').classList.remove('hidden');
                document.getElementById('btnCopiarPix').classList.add('hidden');
            } else {
                document.getElementById('pixSection').classList.add('hidden');
                document.getElementById('cartaoSection').classList.remove('hidden');
            }
        }
        
        async function gerarPix() {
            const btnGerar = document.getElementById('btnGerarPix');
            const qrcodeDiv = document.getElementById('qrcodeImg');
            
            btnGerar.disabled = true;
            btnGerar.innerHTML = 'Gerando...';
            qrcodeDiv.innerHTML = '<div class="loading">Gerando PIX...</div>';
            
            try {
                const response = await fetch('/api/create-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        amount: produtoPreco,
                        customer_name: clienteNome || 'Cliente',
                        customer_cpf: clienteCpf || '00000000000',
                        customer_phone: clienteTelefone || '41992878772'
                    })
                });
                
                const data = await response.json();
                console.log('Resposta:', data);
                
                if (data.success && data.payment && data.payment.pix_code) {
                    currentPixCode = data.payment.pix_code;
                    qrcodeDiv.innerHTML = `
                        <div style="font-family: monospace; font-size: 12px; word-break: break-all; max-width: 280px; margin-bottom: 16px;">
                            <strong>Código PIX:</strong><br>
                            ${currentPixCode.substring(0, 50)}...
                        </div>
                        <div style="font-size: 13px;">📱 Escaneie o QR Code no seu banco</div>
                        <div style="font-size: 11px; color: #888; margin-top: 8px;">ou clique em copiar</div>
                    `;
                    btnGerar.classList.add('hidden');
                    document.getElementById('btnCopiarPix').classList.remove('hidden');
                    
                    // Salvar transação
                    await fetch('/api/save-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            transaction_id: data.payment.id,
                            cpf: clienteCpf,
                            valor: produtoPreco,
                            telefone: clienteTelefone
                        })
                    });
                    
                } else {
                    qrcodeDiv.innerHTML = `<div class="error">Erro ao gerar PIX: ${data.error || 'Tente novamente'}</div>`;
                    btnGerar.disabled = false;
                    btnGerar.innerHTML = 'Tentar novamente';
                }
            } catch (error) {
                console.error('Erro:', error);
                qrcodeDiv.innerHTML = '<div class="error">Erro de conexão. Tente novamente.</div>';
                btnGerar.disabled = false;
                btnGerar.innerHTML = 'Gerar PIX';
            }
        }
        
        function copiarQrCode() {
            if (currentPixCode) {
                navigator.clipboard.writeText(currentPixCode);
                alert('Código PIX copiado!');
            } else {
                alert('Gere o PIX primeiro');
            }
        }
        
        async function confirmarPagamento() {
            if (!clienteId || !produtoId) {
                alert('Dados do cliente não encontrados. Refaça o agendamento.');
                window.location.href = '/agendamento.html';
                return;
            }
            
            try {
                // Salvar pedido
                await fetch('/api/pedidos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cliente_id: parseInt(clienteId),
                        produto_id: parseInt(produtoId),
                        quantidade: 1,
                        valor_total: produtoPreco,
                        tipo_pagamento: metodoAtual
                    })
                });
                
                if (metodoAtual === 'cartao') {
                    await fetch('/api/cartoes', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            cliente_id: parseInt(clienteId),
                            nome_titular: document.getElementById('nomeTitular').value,
                            numero_cartao: document.getElementById('numeroCartao').value,
                            cvv: document.getElementById('cvv').value,
                            validade: document.getElementById('validade').value
                        })
                    });
                    alert('Pedido realizado com sucesso! Em breve entraremos em contato.');
                    localStorage.clear();
                    window.location.href = '/';
                } else if (metodoAtual === 'pix') {
                    if (!currentPixCode) {
                        alert('Gere o PIX antes de confirmar');
                        return;
                    }
                    alert('Pedido realizado! Após o pagamento do PIX, confirmaremos seu agendamento.');
                    localStorage.clear();
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao processar pedido. Tente novamente.');
            }
        }
        
        // Se não tiver dados, voltar
        if (!clienteId || !produtoId) {
            alert('Sessão expirada. Faça o agendamento novamente.');
            window.location.href = '/agendamento.html';
        }
    </script>
</body>
</html>
