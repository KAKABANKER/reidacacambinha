<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - Ativa Caçambas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f14;
            color: #ffffff;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 32px;
            border-left: 4px solid #ffd700;
            padding-left: 20px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ffd700;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            background: #1a2a22;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ffd700;
        }

        .btn {
            background: #ffd700;
            color: #0a1a0f;
            font-weight: 700;
            padding: 14px 32px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }

        .error {
            color: #ff4444;
            font-size: 0.8rem;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Informações para Agendamento</h1>
        <form id="formAgendamento">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-group">
                <label>Telefone (com DDD)</label>
                <input type="tel" id="telefone" required>
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>CPF</label>
                <input type="text" id="cpf" required>
            </div>
            <div class="form-group">
                <label>A caçamba é para:</label>
                <select id="tipoObra" required>
                    <option value="">Selecione</option>
                    <option value="obra_construcao">Obra / Construção</option>
                    <option value="reforma">Reforma</option>
                    <option value="jardinagem">Jardinagem / Limpeza</option>
                    <option value="terreno">Limpeza de terreno</option>
                    <option value="entulho">Remoção de entulho</option>
                </select>
            </div>
            <div class="form-group">
                <label>Endereço da obra</label>
                <input type="text" id="endereco" required>
            </div>
            <div class="form-group">
                <label>Data desejada</label>
                <input type="date" id="data" required>
            </div>
            <div class="form-group">
                <label>Horário preferencial</label>
                <select id="horario" required>
                    <option value="08:00-10:00">08:00 - 10:00</option>
                    <option value="10:00-12:00">10:00 - 12:00</option>
                    <option value="13:00-15:00">13:00 - 15:00</option>
                    <option value="15:00-17:00">15:00 - 17:00</option>
                </select>
            </div>
            <div class="form-group">
                <label>Observações</label>
                <textarea id="observacoes" rows="3"></textarea>
            </div>
            <button type="submit" class="btn">Continuar para produtos</button>
        </form>
    </div>

    <script>
        document.getElementById('formAgendamento').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const clienteData = {
                nome: document.getElementById('nome').value,
                telefone: document.getElementById('telefone').value,
                email: document.getElementById('email').value,
                cpf: document.getElementById('cpf').value
            };
            
            const agendamentoData = {
                tipo_obra: document.getElementById('tipoObra').value,
                endereco_obra: document.getElementById('endereco').value,
                data_agendamento: document.getElementById('data').value,
                horario: document.getElementById('horario').value,
                observacoes: document.getElementById('observacoes').value
            };
            
            try {
                const resCliente = await fetch('/api/clientes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(clienteData)
                });
                const cliente = await resCliente.json();
                
                if (cliente.success) {
                    agendamentoData.cliente_id = cliente.cliente_id;
                    
                    await fetch('/api/agendamentos', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(agendamentoData)
                    });
                    
                    localStorage.setItem('cliente_id', cliente.cliente_id);
                    localStorage.setItem('cliente_nome', clienteData.nome);
                    localStorage.setItem('cliente_telefone', clienteData.telefone);
                    localStorage.setItem('cliente_cpf', clienteData.cpf);
                    
                    window.location.href = '/produtos.html';
                }
            } catch (error) {
                alert('Erro ao salvar dados. Tente novamente.');
            }
        });
        
        const hoje = new Date();
        hoje.setDate(hoje.getDate() + 1);
        document.getElementById('data').min = hoje.toISOString().split('T')[0];
    </script>
</body>
</html>
