<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativa Caçambas | Locação de Caçambas em Curitiba</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f14;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
        }

        p {
            font-size: 1.2rem;
            color: #aaa;
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .btn {
            background: #ffd700;
            color: #0a1a0f;
            font-weight: 700;
            padding: 16px 48px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .info {
            margin-top: 60px;
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .info-item {
            text-align: center;
        }

        .info-item i {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 12px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ATIVA CAÇAMBAS</h1>
        <p>Locação de caçambas estacionárias em Curitiba. Frota própria, certificação ambiental e entrega rápida.</p>
        <a href="/agendamento.html" class="btn">CONHECER SITE</a>
        
        <div class="info">
            <div class="info-item">
                <div>🏗️</div>
                <div>Caçambas 3m³, 5m³, 7m³</div>
            </div>
            <div class="info-item">
                <div>📍</div>
                <div>Hauer, Curitiba - PR</div>
            </div>
            <div class="info-item">
                <div>✅</div>
                <div>Certificação SEMMA</div>
            </div>
        </div>
    </div>
</body>
</html>
